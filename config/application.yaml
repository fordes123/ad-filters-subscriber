      path: https://raw.githubusercontent.com/miaoermua/AdguardFilter/main/rule.txt

    - name: AdguardFilter黑名单
      path: https://raw.githubusercontent.com/miaoermua/AdguardFilter/main/bad_apple.txt
        
    - name: AdguardFilter白名单
      path: https://raw.githubusercontent.com/miaoermua/AdguardFilter/main/whitelist.txt       

  output:
  
    file_header: |
      wiz adblock list of ${type}
      Last Modified: ${date}
      Total Size: ${total}
      Homepage: https://github.com/ALLOVERleng/ad-filters-subscriber

   
    files:
      - name: easylist.txt     
        type: easylist         

      - name: dns.txt
        type: dns
        
      - name: dnsmasq.txt
        type: dnsmasq

      - name: clash.yaml
        type: clash

      - name: smartdns.txt
        type: smartdns

      - name: hosts.txt
        type: hosts

  config:

    #获取器配置
    fetcher:

      http:
        charset: UTF-8
        connect-timeout: 10s
        read-timeout: 30s
        write-timeout: 30s
        response-timeout: 30s
        buffer-size: 4KB

      local:
        charset: UTF-8
        buffer-size: 4KB

    #解析器配置
    parser:

      # 日志级别
      # 解析器日志将单独输出到 parser.log 文件
      log-level: debug

      # 建议最小规则长度
      # 一般来说越短的规则杀伤力越大，当超出此长度时，解析器会输出警告日志
      alert-length: 6

      # 解析器接受的最小规则长度，小于此长度的规则将被认定为无效规则 (0或空为不限制)
      min-length: 0

      # 解析器接受的最大规则长度，大于此长度的规则将被认定为无效规则 (0或空为不限制)
      max-length: 1024  # 默认为 1024 这也是 AdGuard 所支持的最大长度

      # 预期总规则数量
